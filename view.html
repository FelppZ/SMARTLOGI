<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartLogi — Visualização</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{ --accent:#ffe600; --border:#1b1b1b; --glow: rgba(255,230,0,.28); }
    html,body{height:100%}
    body{ margin:0; font-family:Inter,Roboto,Segoe UI,Arial,sans-serif; background:linear-gradient(180deg,#0a0a0a 0%, #161616 100%); color:#f4f4f4; overflow:hidden;}
    .wrap{display:grid; grid-template-rows:72px auto 1fr; height:100%;}
    header{ height:72px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; background:var(--accent); color:#000; box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
    .brand-logo{ display:none; width:auto; height:36px; max-width:220px; object-fit:contain; border-radius:6px; background:#fff0; }
    .title{margin:0; font-size:20px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .btn{ background:#000; color:#ffe600; border:1px solid #000; border-radius:10px; padding:10px 12px; font-weight:700; cursor:pointer; }

    /* Barra de ações centralizada e com botões grandes + glow */
    .actions-bar{
      display:flex; justify-content:center; align-items:center; gap:18px;
      padding:16px; background:linear-gradient(180deg,#141414 0%, #0f0f0f 100%);
      border-bottom:1px solid #1d1d1d;
      box-shadow: 0 4px 18px rgba(0,0,0,.25);
    }
    .action-btn{
      display:inline-flex; align-items:center; gap:12px;
      height:56px; padding:0 18px;
      background:#0f0f0f; color:#ffe600; border:1px solid #2a2a2a; border-radius:14px;
      font-weight:800; font-size:16px; letter-spacing:.2px; cursor:pointer;
      box-shadow: 0 0 0 0 var(--glow);
      transition: transform .08s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .action-btn:hover{ transform:translateY(-1px); border-color:#3a3a3a; background:#141414; box-shadow: 0 0 0 4px var(--glow); }
    .action-btn:focus{ outline:none; box-shadow: 0 0 0 6px var(--glow); }
    .action-btn svg{ width:28px; height:28px; fill:#ffe600; }

    main{ display:grid; grid-template-columns: 460px 1fr; gap:16px; padding:16px; height:calc(100vh - 72px - 88px);}
    .panel{ background:linear-gradient(180deg,#121212 0%,#101010 100%); border:1px solid var(--border); border-radius:12px; padding:14px; }
    .panel h3{ margin:0 0 10px; color:#ffe600; font-size:16px;}
    .kv{ display:grid; grid-template-columns:auto 1fr; gap:8px 10px; font-size:14px;}
    .muted{ color:#bdbdbd; font-size:12px;}
    .tabs{ display:flex; gap:6px; }
    .tab{ padding:8px 12px; border-radius:999px; border:1px solid #2a2a2a; background:#0f0f0f; cursor:pointer; font-weight:700; color:#eaeaea; }
    .tab.active{ background:#ffe600; color:#000; border-color:#ffe600;}
    .list{ margin-top:10px; display:grid; gap:8px; max-height:240px; overflow:auto; padding-right:4px;}
    .item{ display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 10px; border:1px solid #202020; border-radius:10px; background:#0f0f0f; cursor:pointer;}
    .item.active{ border-color:#ffe600; box-shadow:inset 0 0 0 1px #ffe600;}
    .badge{ background:#ffe600; color:#000; padding:2px 8px; border-radius:999px; font-weight:800; font-size:11px;}
    .actions-sm{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .btn-sm{ background:#ffe600; color:#000; border:none; padding:8px 10px; border-radius:8px; font-weight:700; cursor:pointer; font-size:12px; }
    .btn-sm.danger{ background:#ef4444; color:#fff; }
    #map{ width:100%; height:100%; border-radius:12px; }
    .legend{ position:absolute; left:10px; top:10px; background:rgba(0,0,0,.6); border:1px solid #1f1f1f; padding:8px 10px; border-radius:8px; font-size:12px; color:#fff; z-index:400;}
    .legend b{ color:#ffe600; }

    /* Modal */
    .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:9999; backdrop-filter: blur(2px); }
    .modal{ width:min(92vw, 520px); background:linear-gradient(180deg,#151515 0%, #101010 100%); border:1px solid var(--border); border-radius:14px; color:#f2f2f2; box-shadow:0 18px 42px rgba(0,0,0,.45); padding:16px; transform: translateY(8px); opacity:0; transition: opacity .15s ease, transform .15s ease; }
    .modal-backdrop.show{ display:flex; } .modal-backdrop.show .modal{ opacity:1; transform:none; }
    .modal-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .modal-title{ margin:0; font-weight:800; color:#ffe600; font-size:16px; }
    .modal-body{ margin-top:8px; color:#ddd; white-space:pre-line; }
    .modal-actions{ margin-top:14px; display:flex; gap:8px; justify-content:flex-end; }
    .m-btn{ background:#ffe600; color:#000; border:none; padding:10px 12px; border-radius:10px; font-weight:800; cursor:pointer; }
    .m-btn.secondary{ background:transparent; color:#fff; border:1px solid #2a2a2a; }

    /* Loading overlay */
    .loading{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:9998; background:rgba(0,0,0,.45); backdrop-filter: blur(2px); }
    .loading.show{ display:flex; }
    .spinner{ width:72px; height:72px; border-radius:50%; border:6px solid rgba(255,230,0,.25); border-top-color:#ffe600; animation: spin 1s linear infinite; box-shadow: 0 0 24px rgba(255,230,0,.25); }
    .loading-msg{ margin-top:12px; color:#ffe600; font-weight:800; text-shadow:0 1px 0 #000; text-align:center; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-box{ display:grid; place-items:center; gap:8px; background:linear-gradient(180deg, rgba(20,20,20,.9), rgba(12,12,12,.9)); border:1px solid #1f1f1f; padding:16px 18px; border-radius:12px; box-shadow:0 18px 42px rgba(0,0,0,.45); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <img id="tenantLogo" class="brand-logo" alt="Logo do tenant"/>
        <h1 class="title" id="brandTitle">SmartLogi — Visualização</h1>
      </div>
      <div>
        <!-- Alterado: botão Logout no lugar do Voltar -->
        <button id="btnLogout" class="btn">Logout</button>
      </div>
    </header>

    <!-- Barra de ações: centralizada, botões grandes, com glow -->
    <div class="actions-bar">
      <button id="actAddVehicle" class="action-btn" title="Cadastros">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2Zm1 11h3v-2h-3V8h-2v3H8v2h3v3h2v-3Z"/>
        </svg>
        <span>Cadastros</span>
      </button>

      <button id="actTest1" class="action-btn" title="Teste1">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M11 6V3h2v3l3.5 5.01c.31.45.5.99.5 1.57 0 1.66-1.34 2.99-3 2.99h-4c-1.66 0-3-1.33-3-2.99 0-.58.19-1.12.5-1.57L11 6Zm-2.76 7c-.15.22-.24.49-.24.78 0 .82.67 1.49 1.5 1.49h4c.83 0 1.5-.67 1.5-1.49 0-.29-.09-.56-.24-.78L12.83 8h-1.66L8.24 13Z"/>
        </svg>
        <span>Teste1</span>
      </button>

      <button id="actTest2" class="action-btn" title="Teste2">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M11 21h-1l1-7H7l6-11h1l-1 7h4l-6 11Z"/>
        </svg>
        <span>Teste2</span>
      </button>
    </div>

    <main>
      <section class="panel">
        <h3>Seleção</h3>
        <div class="tabs">
          <button id="tabVehicles" class="tab active">Veículos</button>
          <button id="tabWarehouses" class="tab">Armazéns</button>
        </div>
        <div class="muted" style="margin-top:6px;">Selecione um item para visualizar no mapa, ver detalhes e gerenciar.</div>

        <div id="list" class="list"></div>

        <div style="margin-top:14px;">
          <h3>Detalhes</h3>
          <div class="kv">
            <label>Título:</label> <span id="d-title">—</span>
            <label>Tipo:</label> <span id="d-type">—</span>
            <label>Modelo/Unidade:</label> <span id="d-model">—</span>
            <label>Ano/Capacidade:</label> <span id="d-meta">—</span>
            <label>Placa/Endereço:</label> <span id="d-plateaddr">—</span>
            <label>Descrição:</label> <span id="d-desc" style="white-space:pre-line">—</span>
          </div>

          <div class="actions-sm">
            <button id="btnDelete" class="btn-sm danger" disabled>Excluir selecionado</button>
          </div>
          <div class="muted" style="margin-top:6px;">Excluir remove o documento do Firestore. Esta ação não pode ser desfeita.</div>
        </div>
      </section>

      <section class="panel" style="position:relative;">
        <div class="legend"><span id="legendTitle">—</span> • Itens: <b id="legendCount">0</b> • Hubs sempre visíveis</div>
        <div id="map"></div>
      </section>
    </main>
  </div>

  <!-- Themed Modals -->
  <div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h4 id="modalTitle" class="modal-title">Confirmação</h4>
      </div>
      <div id="modalBody" class="modal-body">Tem certeza?</div>
      <div class="modal-actions">
        <button id="modalCancel" class="m-btn secondary">Cancelar</button>
        <button id="modalOk" class="m-btn">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading" class="loading" aria-hidden="true">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loadingMsg" class="loading-msg">Carregando...</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBdGFvV7d3bWUs7_pWlnVVncnZELWG9aIM",
      authDomain: "automech-001.firebaseapp.com",
      databaseURL: "https://automech-001-default-rtdb.firebaseio.com",
      projectId: "automech-001",
      storageBucket: "automech-001.firebasestorage.app",
      messagingSenderId: "866346446102",
      appId: "1:866346446102:web:6d2367ec228b406ccdf437",
      measurementId: "G-X6XV23VDDJ"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => { if (!user) location.href = 'index.html'; });

    const $ = s => document.querySelector(s);
    const params = new URLSearchParams(location.search);
    const tenant = (params.get('tenant') || 'demo').trim();

    // Header Brand: logo + título
    async function setupBrand(){
      try{
        const metaRef = doc(db, 'tenants_meta', tenant);
        const snap = await getDoc(metaRef);
        const data = snap.exists() ? snap.data() : {};
        const logoUrl = data.logoUrl || '';
        const tenantName = data.name || tenant;
        const titleEl = $('#brandTitle');
        const logoEl = $('#tenantLogo');

        if (logoUrl) {
          logoEl.src = logoUrl;
          logoEl.style.display = 'block';
          titleEl.textContent = 'SmartLogi — Visualização';
          logoEl.onerror = () => {
            logoEl.style.display = 'none';
            titleEl.textContent = `${tenantName} — SmartLogi — Visualização`;
          };
        } else {
          logoEl.style.display = 'none';
          titleEl.textContent = `${tenantName} — SmartLogi — Visualização`;
        }
      } catch (e) {
        $('#tenantLogo').style.display = 'none';
        $('#brandTitle').textContent = `${tenant} — SmartLogi — Visualização`;
      }
    }

    // Loading helpers
    const loadingEl = $('#loading');
    const loadingMsg = $('#loadingMsg');
    function showLoading(msg='Carregando...'){ loadingMsg.textContent = msg; loadingEl.classList.add('show'); }
    function hideLoading(){ loadingEl.classList.remove('show'); }

   $('#btnLogout').addEventListener('click', async ()=>{
  showLoading('Saindo...');
  try {
    await signOut(auth); // onAuthStateChanged da view fará o redirect
  } catch (e) {
    alert('Falha ao sair: ' + (e?.message || e));
  } finally {
    hideLoading();
  }
});

    // Ações da barra superior
    $('#actAddVehicle').addEventListener('click', ()=>{
      showLoading('Abrindo cadastro...');
      location.href = 'app.html?tenant=' + encodeURIComponent(tenant);
    });
    $('#actTest1').addEventListener('click', ()=>{ alert('Teste1 clicado (implemente sua ação).'); });
    $('#actTest2').addEventListener('click', ()=>{ alert('Teste2 clicado (implemente sua ação).'); });

    // Leaflet
    const map = L.map('map', { zoomControl:true, minZoom:3, maxZoom:18 }).setView([-15.78, -47.93], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
    const markerLayer = L.layerGroup().addTo(map);
    const warehouseLayer = L.layerGroup().addTo(map);

    function iconVehicle(){
      const svg = `
        <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="11" fill="#ffe600" stroke="#000" stroke-width="2"/>
          <path fill="#000" d="M5 8h9l4 3h1v6h-1a2 2 0 0 1-4 0H9a2 2 0 0 1-4 0H4v-7a2 2 0 0 1 2-2Z"/>
        </svg>`;
      return new L.DivIcon({ className:'', html: svg, iconSize:[22,22], iconAnchor:[11,11] });
    }
    function iconWarehouse(){
      const svg = `
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#000" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="11" fill="#ffe600" stroke="#000" stroke-width="2"/>
          <path d="M5 13V10l7-4 7 4v3h-2V11l-5-3-5 3v2H5Zm3 2h8v3H8v-3Z" fill="#000"/>
        </svg>`;
      return new L.DivIcon({ className:'', html: svg, iconSize:[22,22], iconAnchor:[11,11] });
    }

    // Geocoding
    async function geocodeAddress(address){
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&addressdetails=0`;
      const resp = await fetch(url, { headers: { 'Accept': 'application/json' }});
      if (!resp.ok) throw new Error('Falha no geocoder');
      const data = await resp.json();
      if (!data || !data.length) throw new Error('Endereço não encontrado');
      return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    }

    // Data state
    let vehicles = [];
    let warehouses = [];
    let currentTab = 'vehicles';
    let currentId = null;

    // Themed modal helpers
    const modal = {
      back: $('#modalBackdrop'),
      title: $('#modalTitle'),
      body: $('#modalBody'),
      ok: $('#modalOk'),
      cancel: $('#modalCancel'),
      open({ title='Confirmação', body='Tem certeza?', okText='Confirmar', cancelText='Cancelar', showCancel=true }={}){
        this.title.textContent = title;
        this.body.textContent = body;
        this.ok.textContent = okText;
        this.cancel.textContent = cancelText;
        this.cancel.style.display = showCancel ? 'inline-block' : 'none';
        this.back.classList.add('show');
        return new Promise(resolve => {
          const onOk = ()=>{ cleanup(); resolve(true); };
          const onCancel = ()=>{ cleanup(); resolve(false); };
          const cleanup = ()=>{
            this.ok.removeEventListener('click', onOk);
            this.cancel.removeEventListener('click', onCancel);
            this.back.classList.remove('show');
          };
          this.ok.addEventListener('click', onOk, { once:true });
          this.cancel.addEventListener('click', onCancel, { once:true });
          const outside = (e)=>{ if(e.target===this.back){ cleanup(); resolve(false); this.back.removeEventListener('click', outside); } };
          this.back.addEventListener('click', outside);
        });
      }
    };

    function triggerConfirm(title, body){ return modal.open({ title, body, okText:'Confirmar', cancelText:'Cancelar', showCancel:true }); }
    function triggerAlert(title, body){ return modal.open({ title, body, okText:'OK', cancelText:'', showCancel:false }); }

    // Load from Firestore
    async function loadData(){
      showLoading('Carregando dados...');
      try{
        await setupBrand();

        vehicles = []; warehouses = [];
        const snap = await getDocs(collection(db, 'tenants', tenant, 'vehicles'));
        snap.forEach(docSnap => {
          const v = { id: docSnap.id, ...docSnap.data() };
          if (v.tipo === 'storage') warehouses.push(v); else vehicles.push(v);
        });
        await ensureWarehousesOnMap();
        renderList();
        $('#legendTitle').textContent = currentTab === 'vehicles' ? 'Veículos' : 'Armazéns';
        $('#legendCount').textContent = String((currentTab === 'vehicles' ? vehicles : warehouses).length);
        currentId = null;
        ['d-title','d-type','d-model','d-meta','d-plateaddr','d-desc'].forEach(id=>$('#'+id).textContent='—');
        $('#btnDelete').disabled = true;
      } finally { hideLoading(); }
    }

    async function ensureWarehousesOnMap(){
      warehouseLayer.clearLayers();
      for (const wh of warehouses){
        let { lat, lng } = wh;
        if ((!lat || !lng) && wh.endereco){
          try {
            showLoading('Localizando armazéns...');
            const pt = await geocodeAddress(wh.endereco);
            lat = pt.lat; lng = pt.lng;
            await updateDoc(doc(db, 'tenants', tenant, 'vehicles', wh.id), { lat, lng });
            wh.lat = lat; wh.lng = lng;
          } catch (e) { /* ignore */ }
          finally { hideLoading(); }
        }
        if (lat && lng) {
          L.marker([lat, lng], { icon: iconWarehouse() })
            .addTo(warehouseLayer)
            .bindPopup(`<b>${wh.titulo || wh.unidadeTipo || 'Armazenamento'}</b><br><small>${wh.endereco || ''}</small>`);
        }
      }
    }

    function renderList(){
      const data = currentTab === 'vehicles' ? vehicles : warehouses;
      const list = data.map(d => `
        <div class="item ${currentId===d.id?'active':''}" data-id="${d.id}">
          <div>
            <div style="font-weight:800;">${d.titulo || (currentTab==='vehicles' ? 'Veículo' : (d.unidadeTipo || 'Armazém'))}</div>
            <div class="muted">${currentTab==='vehicles'
              ? `Placa: ${d.placa || '—'} • Modelo: ${d.modelo || '—'}`
              : `End.: ${d.endereco || '—'}`
            }</div>
          </div>
          <span class="badge">${currentTab==='vehicles' ? (d.tipo || 'veh') : (d.unidadeTipo || 'stor')}</span>
        </div>
      `).join('');
      $('#list').innerHTML = list || '<div class="muted">Nada a listar.</div>';
      $('#list').querySelectorAll('.item').forEach(el=>{ el.addEventListener('click', ()=> selectItem(el.getAttribute('data-id'))); });
    }

    async function selectItem(id){
      currentId = id; renderList();
      const data = currentTab === 'vehicles' ? vehicles : warehouses;
      const obj = data.find(x => x.id === id); if (!obj) return;

      $('#d-title').textContent = obj.titulo || '—';
      $('#d-type').textContent = obj.tipo || (currentTab==='vehicles' ? 'vehicle' : 'storage');
      $('#d-model').textContent = currentTab==='vehicles' ? (obj.modelo || '—') : (obj.unidadeTipo || '—');
      $('#d-meta').textContent = currentTab==='vehicles'
        ? [obj.ano && `Ano: ${obj.ano}`, obj.capacidadeKg && `Cap.: ${obj.capacidadeKg} kg`].filter(Boolean).join(' • ') || '—'
        : [obj.capacidadeM3 && `Cap.: ${obj.capacidadeM3} m³`].filter(Boolean).join(' • ') || '—';
      $('#d-plateaddr').textContent = currentTab==='vehicles' ? (obj.placa || '—') : (obj.endereco || '—');
      $('#d-desc').textContent = obj.descricao || '—';
      $('#btnDelete').disabled = false;

      markerLayer.clearLayers();
      if (currentTab === 'vehicles') {
        if (obj.lat && obj.lng) {
          const m = L.marker([obj.lat, obj.lng], { icon: iconVehicle() }).addTo(markerLayer)
            .bindPopup(`<b>${obj.titulo || 'Veículo'}</b><br><small>Placa: ${obj.placa || '—'}</small>`);
          map.setView([obj.lat, obj.lng], 12); m.openPopup();
        } else { triggerAlert('Sem localização', 'Este veículo não possui posição (lat/lng) cadastrada.'); }
      } else {
        let { lat, lng } = obj;
        if ((!lat || !lng) && obj.endereco) {
          try {
            showLoading('Localizando endereço do armazém...');
            const pt = await geocodeAddress(obj.endereco);
            lat = pt.lat; lng = pt.lng;
            await updateDoc(doc(db, 'tenants', tenant, 'vehicles', obj.id), { lat, lng });
            obj.lat = lat; obj.lng = lng;
            await ensureWarehousesOnMap();
          } catch (e) { await triggerAlert('Geocodificação', 'Não foi possível localizar o endereço informado.'); }
          finally { hideLoading(); }
        }
        if (lat && lng) {
          const m = L.marker([lat, lng], { icon: iconWarehouse() }).addTo(markerLayer)
            .bindPopup(`<b>${obj.titulo || obj.unidadeTipo || 'Armazenamento'}</b><br><small>${obj.endereco || ''}</small>`);
          map.setView([lat, lng], 12); m.openPopup();
        }
      }
    }

    // Excluir item selecionado
    $('#btnDelete').addEventListener('click', async ()=>{
      if (!currentId) return;
      const data = currentTab === 'vehicles' ? vehicles : warehouses;
      const obj = data.find(x => x.id === currentId); if (!obj) return;
      const label = currentTab === 'vehicles' ? 'veículo' : 'armazém';
      const name = obj.titulo || obj.placa || obj.unidadeTipo || obj.id;

      const ok = await triggerConfirm('Excluir', `Deseja realmente excluir o ${label} "${name}"? Esta ação não pode ser desfeita.`);
      if (!ok) return;

      showLoading('Excluindo...');
      try {
        await deleteDoc(doc(db, 'tenants', tenant, 'vehicles', obj.id));
        await triggerAlert('Concluído', `${label} excluído com sucesso.`);
        await loadData();
      } catch (e) {
        await triggerAlert('Erro', `Falha ao excluir: ${e?.message || e}`);
      } finally { hideLoading(); }
    });

    // Tabs
    $('#tabVehicles').addEventListener('click', ()=>{
      currentTab = 'vehicles'; currentId = null;
      $('#tabVehicles').classList.add('active');
      $('#tabWarehouses').classList.remove('active');
      $('#legendTitle').textContent = 'Veículos';
      $('#legendCount').textContent = String(vehicles.length);
      markerLayer.clearLayers();
      renderList();
      ['d-title','d-type','d-model','d-meta','d-plateaddr','d-desc'].forEach(id=>$('#'+id).textContent='—');
      $('#btnDelete').disabled = true;
    });
    $('#tabWarehouses').addEventListener('click', ()=>{
      currentTab = 'warehouses'; currentId = null;
      $('#tabWarehouses').classList.add('active');
      $('#tabVehicles').classList.remove('active');
      $('#legendTitle').textContent = 'Armazéns';
      $('#legendCount').textContent = String(warehouses.length);
      markerLayer.clearLayers();
      renderList();
      ['d-title','d-type','d-model','d-meta','d-plateaddr','d-desc'].forEach(id=>$('#'+id).textContent='—');
      $('#btnDelete').disabled = true;
    });

    // Boot
    (async function init(){
      try{ await loadData(); }
      catch (e) { await triggerAlert('Erro', e?.message || 'Erro ao carregar dados.'); }
    })();
  </script>
</body>
</html>
